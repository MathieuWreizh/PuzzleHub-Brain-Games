name: blind_test
description: "Puzzle Games - Sudoku and more"
publish_to: 'none'

version: 0.0.1+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  cupertino_icons: ^1.0.8

  # HTTP & API
  http: ^1.2.2

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  animate_do: ^3.3.4

  # Utils
  uuid: ^4.5.1

  # Firebase (multijoueur)
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  google_sign_in: ^6.2.1
  shared_preferences: ^2.5.4

  # Publicités
  google_mobile_ads: ^5.3.0

  # Notifications locales
  flutter_local_notifications: ^18.0.0

  # Liens externes (politique de confidentialité, etc.)
  url_launcher: ^6.3.1

  # Authentification Apple (App Store 4.8)
  sign_in_with_apple: ^6.0.0
  crypto: ^3.0.3

  # App Tracking Transparency iOS (App Store 2.1)
  app_tracking_transparency: ^2.0.6

  # Ambiances sonores
  just_audio: ^0.9.44

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.jpg"
  min_sdk_android: 21
  adaptive_icon_background: "#F5F3FF"
  adaptive_icon_foreground: "assets/images/app_icon.jpg"
  web:
    generate: false

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sounds/
